name: Brew Auto Update

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Install Homebrew
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          printf '%s\n' "eval \"\$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)\"" >> "$HOME/.bashrc"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew update

      - name: Add Homebrew to PATH
        run: |
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Tap repository
        run: |
          brew tap "${{ github.repository }}"

      - name: Install dependencies
        run: |
          brew install jq

      - name: Run brew livecheck
        run: |
          brew livecheck --tap="${{ github.repository }}" --json > livecheck.json
          cat livecheck.json

      - name: Update outdated formulae
        run: |
          mapfile -t outdated < <(jq -r '.[] | select(.version.latest != .version.current) | .formula' livecheck.json)

          if [ "${#outdated[@]}" -eq 0 ]; then
            echo "No updates found."
            exit 0
          fi

          for formula in "${outdated[@]}"; do
            echo "Updating ${formula}"
            brew bump-formula-pr \
              --no-browse \
              --no-audit \
              --no-fork \
              --message="Auto-update ${formula}" \
              "${formula}" || true
          done

      - name: Run brew style
        run: |
          brew style "${{ github.repository }}"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update brew formulas"
            git push
          else
            echo "No changes to commit."
          fi
