name: Brew Livecheck & Update (Linux)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  livecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Homebrew (Linuxbrew)
        run: |
          NONINTERACTIVE=1 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

          echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> ~/.bashrc
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

          brew update

      - name: Add brew to PATH
        run: |
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: Tap your repo
        run: |
          brew tap ${{ github.repository }}

      - name: Install jq
        run: |
          brew install jq

      - name: Run brew livecheck
        run: |
          brew livecheck --tap=${{ github.repository }} --json > livecheck.json
          cat livecheck.json

      - name: Update outdated formulae
        run: |
          outdated=$(jq -r '.[] | select(.version.latest != .version.current) | .formula' livecheck.json)

          if [ -z "$outdated" ]; then
            echo "No updates found."
            exit 0
          fi

          for formula in $outdated; do
            echo "Updating $formula"
            brew bump-formula-pr \
              --no-browse \
              --no-audit \
              --no-fork \
              --message="Auto-update $formula" \
              $formula || true
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "chore: update brew formulas"
          git push
