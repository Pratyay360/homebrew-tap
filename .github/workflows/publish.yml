name: check update

on:
  schedule:
    - cron: "0 2 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Homebrew (Linuxbrew)
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          brew update

      - name: Get latest version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          brew tap ${{ github.repository_owner }}/tap
          casks="$(brew livecheck --eval-all --json $(brew search "${{ github.repository_owner }}/tap") | jq '.[].cask')"
          for cas in $casks; do
            cask=$(echo "$cas" | tr -d '"')
            should_bump="$(brew livecheck --json $cask | jq -r '.[].version.outdated')"
            if [ "$should_bump" = "true" ]; then
              echo "$(brew livecheck --json $cask | jq -r '.[].version.latest')"
              brew bump-cask-pr --commit --write-only $cask --version "$(brew livecheck --json $cask | jq -r '.[].version.latest')"
              echo "Bumping $cask"
            else
              echo "Skipping $cask"
            fi
            git add . && git commit -m "Update casks" && git push
          done
