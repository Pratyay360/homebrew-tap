name: check update

on:
  schedule:
    - cron: "0 2 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Homebrew (Linuxbrew)
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
          brew update

      - name: Check for updates and bump casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          brew tap "${{ github.repository_owner }}/tap"

          # Get cask names from the tap
          mapfile -t casks < <(brew search "${{ github.repository_owner }}/tap/" | \
            grep "^${{ github.repository_owner }}/tap/" | \
            sed "s|^${{ github.repository_owner }}/tap/||")

          for cask in "${casks[@]}"; do
            echo "::group::Checking $cask"

            # Check if outdated
            outdated=$(brew livecheck --json "$cask" 2>/dev/null | jq -r '.[0].version.outdated // "false"')

            if [ "$outdated" = "true" ]; then
              latest=$(brew livecheck --json "$cask" 2>/dev/null | jq -r '.[0].version.latest')
              echo "Updating $cask to $latest"
              brew bump-cask-pr --no-browse "$cask" --version "$latest" || echo "Failed to bump $cask"
            else
              echo "Up to date"
            fi
            echo "::endgroup::"
          done
